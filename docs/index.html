  <!-- Typst WebAssembly Compiler Script -->
  <script src="https://cdn.jsdelivr.net/npm/@myriaddreamin/typst.ts/dist/esm/contrib/all-in-one-lite.bundle.js" id="typst-script"></script>
  <script>
    window.compileTypstToPdf = async function(typstSource) {
      if (typeof $typst === 'undefined') {
        throw new Error("Typst WebAssembly compiler is still loading. Please try again in a moment.");
      }
      if (!window.typstInitialized) {
        $typst.setCompilerInitOptions({
          getModule: () => 'https://cdn.jsdelivr.net/npm/@myriaddreamin/typst-ts-web-compiler/pkg/typst_ts_web_compiler_bg.wasm',
        });
        window.typstInitialized = true;
      }
      try {
        const pdfBytes = await $typst.pdf({
          mainContent: typstSource
        });
        return pdfBytes; // Returns Uint8Array
      } catch (err) {
        console.error("Typst in-browser compilation error:", err);
        throw err;
      }
    };
  </script>

    <div class="text-xs text-slate-500 font-mono">Loading ClojureScript & WebAssembly environment</div>
  </div>

  <!-- Load ClojureScript logic -->
  <script src="app.cljs" type="application/x-scittle"></script>
  
  <script>
    // Remove loading overlay once Scittle has executed the app script
    document.addEventListener("DOMContentLoaded", () => {
      // Give a tiny delay for Scittle engine to evaluate and boot
      setTimeout(() => {
        const overlay = document.getElementById("loading-overlay");
        if (overlay) {
          overlay.style.opacity = '0';
          overlay.style.transition = 'opacity 0.5s ease';
          setTimeout(() => overlay.remove(), 500);
        }
      }, 1500);
    });
  </script>
