# Career-Ops Profile Configuration (Singapore Edition)
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Alex Tan"
  email: "alex.tan@example.com"
  phone: "+65 9123 4567"
  location: "Singapore"
  linkedin: "linkedin.com/in/alextan"
  portfolio_url: "https://alextan.dev"
  github: "github.com/alextan"
  national_service: "Completed" # Options: Completed, Completed (NSFs), Exempted, N/A

target_roles:
  # Your North Star roles — what you're optimizing for in Singapore
  primary:
    - "Senior Platform Security Engineer"
    - "DevSecOps Engineer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "DevSecOps / Platform Security"
      level: "Senior"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "Solutions Architect"
      level: "Mid-Senior"
      fit: "secondary"
    - name: "IT Security Audit Specialist"
      level: "Senior"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "Platform Security Specialist & Linux Power-User"
  # Your exit story — what makes you unique
  exit_story: "Managed mission-critical air-gapped systems and government security compliance. Moving to platform security engineering."
  # Your top 3-5 superpowers
  superpowers:
    - "Privileged Access Management (PAM - CyberArk)"
    - "Linux System Administration (CachyOS/Arch/RedHat)"
    - "Security Policy Automation (PowerShell/Bash)"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
    - name: "Purview DLP Implementation"
      hero_metric: "Achieved Cyber Trust Mark Tier 3 certification"
    - name: "PAM Automation"
      hero_metric: "Managed daily PVWA/PSM operations for 50+ external contractors"

compensation:
  monthly_base_target: "S$8,500"       # Target monthly base salary (standard in SG)
  aws_13th_month: true                 # Annual Wage Supplement (AWS) expectation
  target_annual_bonus: "2-3 months"    # Expected variable performance bonus
  last_drawn_monthly: "S$6,500"        # Last drawn monthly base salary
  currency: "SGD"
  location_flexibility: "Hybrid preferred (2-3 days remote/office), fully open to permanent or contract"

location:
  country: "Singapore"
  timezone: "Asia/Singapore"           # Timezone for SGT (UTC+8)
  residency_status: "Singapore Citizen" # citizen/PR/employment pass (relevance for FCF/MOM approvals)
  onsite_availability: "Fully available locally"

cv:
  output_format: "html"
